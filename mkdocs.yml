site_name: DimOS Documentation
site_author: Dimensional Team

hooks:
  - docs/hooks.py
site_description: The universal framework for AI-native generalist robotics
repo_name: dimensionalOS/dimos
repo_url: https://github.com/dimensionalOS/dimos
site_url: https://dimensionalos.com/
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs            # Moves top-level nav to header tabs
    - navigation.tabs.sticky     # Keeps tabs visible when scrolling
    - navigation.indexes         # Allows section index pages
    - navigation.expand          # Expands navigation by default
    - navigation.instant         # SPA-like navigation
    - navigation.top             # Back to top button
    - navigation.tracking        # URL updates with scroll
    - search.highlight           # Highlight search terms
    - search.share               # Share search results
    - search.suggest             # Search suggestions
    - toc.follow                 # TOC follows scroll position
    - content.code.copy          # Copy button for code blocks
    - content.code.select        # Select code blocks
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - abbr
  - admonition
  - github-callouts
  - pymdownx.details
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      base_path: ['.']

nav:
  - Home: index.md
  - Quickstart:
    - quickstart/index.md
    - Installation: quickstart/installation.md
    - Basic Usage: quickstart/basic-usage.md
  - Concepts:
    - concepts/index.md
    - Modules: concepts/modules.md
    - Skills: concepts/skills.md
    - Agent: concepts/agent.md
    - Transport: concepts/transport.md
    - Blueprints: concepts/blueprints.md
  - API Reference:
    - api/index.md
    - Agents: api/agents.md
    - Skills: api/skills.md

plugins:
  - search
  - marimo
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            members_order: alphabetical
            allow_inspection: true
            show_bases: true
            show_source: true
            signature_crossrefs: true
  # llms.txt-es are auto-generated
  - llmstxt:
      markdown_description: >
        DimOS is the universal framework for AI-native generalist robotics.
        It provides a comprehensive platform for building intelligent robotic systems
        with seamless integration of perception, navigation, manipulation, and AI agents.
      full_output: llms-full.txt
      # TODO: Look into generating the sections from a literate-nav SUMMARY.md in the future
      # to avoid having to manually synchronize with nav
      sections:
        Home:
          - index.md: Introduction to DimOS
        Quickstart:
          - quickstart/*.md
        Concepts:
          - concepts/*.md
        API Reference:
          - api/*.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dimensionalOS/dimos
