services:
  dimos_autonomy_stack:
    build:
      context: ../..
      dockerfile: docker/navigation/Dockerfile
    image: dimos_autonomy_stack:jazzy
    container_name: dimos_autonomy_container

    # Enable interactive terminal
    stdin_open: true
    tty: true

    # Network configuration - required for ROS communication
    network_mode: host

    # Privileged mode for hardware access (required for real robot and some devices)
    privileged: true

    runtime: ${DOCKER_RUNTIME:-runc}

    # Environment variables for display and ROS
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-}
      - ROS_DOMAIN_ID=0
      - ROBOT_CONFIG_PATH=mechanum_drive

    # Volume mounts
    volumes:
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw

      # Mount Unity environment models (if available)
      - ./unity_models:/ros2_ws/src/autonomy_stack_mecanum_wheel_platform/src/base_autonomy/vehicle_simulator/mesh/unity:rw

      # Mount the autonomy stack source for development (optional - comment out if not needed)
      - ./autonomy_stack_mecanum_wheel_platform/src:/ros2_ws/src/autonomy_stack_mecanum_wheel_platform/src:rw

      # Mount entire dimos directory for live development
      - ../..:/workspace/dimos:rw

      # Mount bagfiles directory (optional)
      - ./bagfiles:/ros2_ws/bagfiles:rw

      # Mount config files for easy editing
      - ./config:/ros2_ws/config:rw

    # Device access (for joystick controllers, serial devices, and cameras)
    devices:
      - /dev/input:/dev/input
      - /dev/dri:/dev/dri
      # Uncomment if using real robot with motor controller
      # - /dev/ttyACM0:/dev/ttyACM0
      # - /dev/ttyUSB0:/dev/ttyUSB0
      # Uncomment if using cameras
      # - /dev/video0:/dev/video0

    # Working directory
    working_dir: /workspace/dimos

    # Command to run (can be overridden)
    command: bash